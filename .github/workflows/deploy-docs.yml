name: Generate and Deploy OCaml Docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.x

      - name: Install dependencies
        run: opam install . --deps-only --with-doc -y

      - name: Generate docs
        run: opam exec -- dune build @doc

      - name: Create subdomain directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: mkdir -p /var/www/${{ vars.SITE }}/subdomains/${{ github.event.repository.name }}

      - name: Copy docs to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "./_build/default/_doc/_html/"
          target: /var/www/${{ vars.SITE }}/subdomains/${{ github.event.repository.name }}/
          strip_components: 4
